<h1>📅 Schedule</h1>

	<div class="week-calendar" id="weekCalendar">
	<div class="week-calendar__header">
	  <h2 class="week-calendar__title">Week of July 13–19</h2>
	  <p class="week-calendar__subtitle">Click on a day to see events</p>
	</div>

	<div class="week-calendar__grid" id="weekCalendarGrid"></div>
	</div>

	<script>
	(() => {
	  const grid = document.getElementById("weekCalendarGrid");

	  const days = [
		{
		  dayName: "Mon",
		  dateLabel: "Jul 13",
		  events: [
			{
				preview: "Openning Ceremony (16:30)",
				title: "Openning Ceremony (16:30)",
				details: "Welcome Ceremony, Monday July 13th  at 16:30"
			},
			{
				preview: "1st Round (17:00)",
				title: "1st Round (17:00)",
				details: "1st Round Monday July 13th at 17:00"
			}
		  ]
		},
		{
		  dayName: "Tue",
		  dateLabel: "Jul 14",
		  events: [
			{
				preview: "2nd Round (10:00)",
				title: "2nd Round (10:00)",
				details: "2nd Round Tuesday July 14th at 10:00"
			},
			{
				preview: "3rd Round (17:00)",
				title: "3rd Round (17:00)",
				details: "3rd Round Tuesday July 14th at 17:00"
			}
		  ]
		},
		{
		  dayName: "Wed",
		  dateLabel: "Jul 15",
		  events: [
			{
				preview: "4th Round (17:00)",
				title: "4th Round (17:00)",
				details: "4th Round Wednesday July 15th at 17:00"
			}
		  ]
		},
		{
		  dayName: "Thu",
		  dateLabel: "Jul 16",
		  events: [
			{
				preview: "5th Round (10:00)",
				title: "5th Round (10:00)",
				details: "5th Round Thursday July 16th at 10:00"
			},
			{
				preview: "6th Round (17:00)",
				title: "6th Round (17:00)",
				details: "6th Round Thursday July 16th at 17:00"
			}
		  ]
		},
		{
		  dayName: "Fri",
		  dateLabel: "Jul 17",
		  events: [
			{
				preview: "7th Round (17:00)",
				title: "7th Round (17:00)",
				details: "7th Round Friday July 17th at 17:00"
			},
			{
				preview: "Blitz Tournament (22:00)",
				title: "Blitz Tournament (22:00)",
				details: "5+3 blitz tournament at 22:00 in a bar associated with the organization"
			}
		  ]
		},
		{
		  dayName: "Sat",
		  dateLabel: "Jul 18",
		  events: [
			{
				preview: "8th Round (17:00)",
				title: "8th Round (17:00)",
				details: "8th Round Saturday July 18th at 17:00"
			}
		  ]
		},
		{
		  dayName: "Sun",
		  dateLabel: "Jul 19",
		  events: [
			{
				preview: "9th Round (9:30)",
				title: "9th Round (9:30)",
				details: "9th Round Sunday July 19th at 9:30"
			},
			{
				preview: "Closing Ceremony (14:00)",
				title: "Closing Ceremony (14:00)",
				details: "Prize giving and closing ceremony July 19 at 14:00"
			}
		  ]
		}
	  ];

	  let expandedCard = null;

	  function collapseExpandedCard() {
		if (expandedCard) {
		  expandedCard.classList.remove("is-expanded");
		  expandedCard = null;
		}
	  }

	  function escapeHtml(value) {
		return String(value)
		  .replace(/&/g, "&amp;")
		  .replace(/</g, "&lt;")
		  .replace(/>/g, "&gt;")
		  .replace(/"/g, "&quot;")
		  .replace(/'/g, "&#039;");
	  }

	  function renderWeek() {
		grid.innerHTML = "";

		days.forEach((item) => {
		  const card = document.createElement("article");
		  card.className = "week-calendar__day";
		  card.tabIndex = 0;
		  card.setAttribute("role", "button");
		  card.setAttribute("aria-expanded", "false");
		  card.setAttribute(
			"aria-label",
			`${item.dayName} ${item.dateLabel}, ${item.events.length} event${item.events.length === 1 ? "" : "s"}`
		  );

		  const previewsHtml = item.events.length
			? item.events.map(
				  (event) => `
					<div class="week-calendar__preview">${escapeHtml(event.preview)}</div>
				  `
				).join("")
			: `<div class="week-calendar__empty">No events</div>`;

		  const detailsHtml = item.events.length
			? item.events.map(
				  (event) => `
					<div class="week-calendar__event">
					  <div class="week-calendar__details-title">${escapeHtml(event.title)}</div>
					  <div class="week-calendar__details-text">${escapeHtml(event.details)}</div>
					</div>
				  `
				).join("")
			: `<div class="week-calendar__details-text">Nothing scheduled for this day.</div>`;

		  card.innerHTML = `
			<div class="week-calendar__day-top">
			  <div>
				<div class="week-calendar__day-name">${escapeHtml(item.dayName)}</div>
				<div class="week-calendar__date">${escapeHtml(item.dateLabel)}</div>
			  </div>
			  <span class="week-calendar__count" aria-hidden="true">${item.events.length}</span>
			</div>

			<div class="week-calendar__preview-list">
			  ${previewsHtml}
			</div>

			<div class="week-calendar__details">
			  ${detailsHtml}
			</div>
		  `;

		  card.addEventListener("click", (event) => {
			event.stopPropagation();

			const alreadyExpanded = card.classList.contains("is-expanded");

			if (expandedCard && expandedCard !== card) {
			  expandedCard.classList.remove("is-expanded");
			  expandedCard.setAttribute("aria-expanded", "false");
			}

			if (alreadyExpanded) {
			  card.classList.remove("is-expanded");
			  card.setAttribute("aria-expanded", "false");
			  expandedCard = null;
			} else {
			  card.classList.add("is-expanded");
			  card.setAttribute("aria-expanded", "true");
			  expandedCard = card;
			}
		  });

		  card.addEventListener("keydown", (event) => {
			if (event.key === "Enter" || event.key === " ") {
			  event.preventDefault();
			  card.click();
			}
		  });

		  grid.appendChild(card);
		});
	  }

	  document.addEventListener("click", (event) => {
		if (!event.target.closest(".week-calendar__day")) {
		  if (expandedCard) {
			expandedCard.setAttribute("aria-expanded", "false");
		  }
		  collapseExpandedCard();
		}
	  });

	  renderWeek();
	})();
	</script>

		<p><strong>Round 8:</strong> Saturday July 18 at 17:00</p>

	</noscript>
