<script>
// 🔊 SOUND
function reproducirSonido() {
    const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");
    audio.play();
}

// 💰 COUNTER
let total = 6750;
let contador = document.getElementById("contador");
let i = 0;

let intervalo = setInterval(() => {
    i += 50;
    contador.innerHTML = "💰 " + i + "€ in prizes";
    if (i >= total) {
        contador.innerHTML = "💰 6750€ in prizes";
        clearInterval(intervalo);
        reproducirSonido(); // 🔊 sound plays here
        animarPodio(); // 🎬 podium animation
    }
}, 20);

// 🎬 PODIUM ANIMATION
function animarPodio() {
    const puestos = document.querySelectorAll(".puesto");

    puestos.forEach((p, i) => {
        p.style.transform = "translateY(50px)";
        p.style.opacity = "0";

        setTimeout(() => {
            p.style.transition = "all 0.6s ease";
            p.style.transform = "translateY(0)";
            p.style.opacity = "1";
        }, i * 200);
    });
}

// ✨ SCROLL
const elementos = document.querySelectorAll('.animar');

const mostrarElemento = () => {
    const alturaPantalla = window.innerHeight;

    elementos.forEach(el => {
        const distancia = el.getBoundingClientRect().top;
        if (distancia < alturaPantalla - 100) {
            el.classList.add('visible');
        }
    });
};

window.addEventListener('scroll', mostrarElemento);
window.addEventListener('load', mostrarElemento);

</script>
