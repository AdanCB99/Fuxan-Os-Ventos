    margin-top: 15px;

    border-radius: 10px;
    background: #0077ff;
    color: white;
    font-size: 16px;
    cursor: pointer;

    background: #005ed6;
}

.plataformas {
    margin-top: 25px;
    display: none;
    flex-direction: column;
    gap: 12px;
}

.boton-plataforma {
    display: flex;
    justify-content: center;
    padding: 14px;
    border-radius: 12px;
    font-weight: bold;
    color: white;
}

.maps { background: #34a853; }
.omio { background: #6c2bd9; }
.rome2rio { background: #ff5a00; }

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
}

.recomendada {
    border: 2px solid #0077ff;
}
</style>

<script defer>
function buscarTodo() {

    const origen = document.getElementById("origen").value.trim().toLowerCase();

    if (!origen) {
        alert("Escribe dende onde viaxas");
        return;
    }

    const fecha = "2026-07-13";
    const origenURL = encodeURIComponent(origen);

    // 🌍 LINKS EXTERNOS
    document.getElementById("btnMaps").href =
        `https://www.google.com/maps/dir/?api=1&origin=${origenURL}&destination=Lugo&travelmode=transit`;

    document.getElementById("btnOmio").href =
        `https://www.omio.es/app/search-frontend/results/${origenURL}/LUG/${fecha}`;

    document.getElementById("btnRome2Rio").href =
        `https://www.rome2rio.com/es/map/${origenURL}/Lugo`;

    document.getElementById("plataformas").style.display = "flex";

    // 🤖 SISTEMA DE RUTAS LOCAL
    const rutas = {
        madrid: [
            {tipo:"AVE + bus", icono:"🚆", tiempo:4, precio:60},
            {tipo:"Bus", icono:"🚌", tiempo:7, precio:30},
            {tipo:"Avión + bus", icono:"✈️", tiempo:3, precio:80}
        ],
        barcelona: [
            {tipo:"Avión + bus", icono:"✈️", tiempo:3, precio:70},
            {tipo:"Bus", icono:"🚌", tiempo:12, precio:50}
        ],
        valencia: [
            {tipo:"AVE + bus", icono:"🚆", tiempo:5, precio:65}
        ]
    };

    const contenedor = document.getElementById("resultado");
    const ia = document.getElementById("ia");

    if (!rutas[origen]) {
        contenedor.innerHTML = "<p>⚠️ Non hai datos internos para esta cidade</p>";
        ia.innerHTML = "";
        return;
    }

    let opciones = rutas[origen];

    let masRapido = opciones.reduce((a,b)=> a.tiempo < b.tiempo ? a : b);
    let masBarato = opciones.reduce((a,b)=> a.precio < b.precio ? a : b);

    contenedor.innerHTML = "";

    opciones.forEach(op => {

        let clase = "card";
        if (op === masRapido || op === masBarato) clase += " recomendada";

        let etiqueta = "";
        if (op === masRapido) etiqueta = "⚡ MÁIS RÁPIDO";
        if (op === masBarato) etiqueta = "💸 MÁIS BARATO";

        contenedor.innerHTML += `
        <div class="${clase}">
            <h3>${op.icono} ${op.tipo}</h3>
            <p>⏱ ${op.tiempo}h</p>
            <p>💰 ${op.precio}€</p>
            <strong>${etiqueta}</strong>
        </div>
        `;
    });

    let recomendacion = (masRapido.precio <= masBarato.precio + 15)
        ? `Recoméndoche <strong>${masRapido.tipo}</strong> porque é máis rápido.`
        : `Recoméndoche <strong>${masBarato.tipo}</strong> porque é máis barato.`;

    ia.innerHTML = "🤖 " + recomendacion;
}
</script>
